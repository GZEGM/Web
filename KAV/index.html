      async function initAuth() {
        if (
          typeof __initial_auth_token !== "undefined" &&
          __initial_auth_token
        ) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        setupRealtimeSync();
      });

      async function setupRealtimeSync() {
        const dataCol = collection(
          db,
          "artifacts",
          appId,
          "public",
          "data",
          "students",
        );

        // Lắng nghe thay đổi realtime
        onSnapshot(
          dataCol,
          (snapshot) => {
            if (snapshot.empty) {
              seedData();
              return;
            }

            students = snapshot.docs.map((doc) => ({
              id: doc.id,
              ...doc.data(),
            }));

            updateAvg(); // Cập nhật trung bình tổng thể của cả lớp
            renderList(); // Render danh sách có áp dụng sort & filter
          },
          (error) => {
            console.error("Firestore Error:", error);
          },
        );
      }

      async function seedData() {
        const dataCol = collection(
          db,
          "artifacts",
          appId,
          "public",
          "data",
          "students",
        );
        for (const s of initialStudents) {
          const docRef = doc(dataCol);
          await setDoc(docRef, s);
        }
      }

      function updateAvg() {
        if (students.length === 0) return;
        const sum = students.reduce((a, b) => a + b.progress, 0);
        classAvgDiv.innerText = (sum / students.length).toFixed(1) + "%";
      }

      // Logic tô màu trực tiếp bằng Tailwind CSS classes
      function getBgClass(val) {
        if (val <= 10) return "bg-red-500 text-white font-semibold"; // Đỏ cho <= 10%
        if (val === 100) return "bg-green-500 text-white font-bold"; // Xanh cho = 100%
        if (val >= 90) return "bg-yellow-400 text-black font-semibold"; // Vàng cho >= 90%
        return "bg-white text-gray-800 hover:bg-gray-50"; // Trắng/Xám cho các trường hợp còn lại
      }

      // Logic xử lý Lọc & Sắp xếp
      function getProcessedStudents() {
        let result = [...students];

        // 1. Áp dụng Lọc (Filter)
        if (currentFilter.op !== "all") {
          const val = currentFilter.val;
          result = result.filter((s) => {
            if (currentFilter.op === ">=") return s.progress >= val;
            if (currentFilter.op === "<=") return s.progress <= val;
            if (currentFilter.op === "=") return s.progress === val;
            return true;
          });
        }

        // 2. Áp dụng Sắp xếp (Sort)
        result.sort((a, b) => {
          if (currentSort === "name-asc") {
            return a.name.localeCompare(b.name, "vi");
          } else if (currentSort === "prog-asc") {
            return a.progress - b.progress;
          } else if (currentSort === "prog-desc") {
            return b.progress - a.progress;
          }
          return 0;
        });

        return result;
      }

      window.handleSortChange = () => {
        currentSort = sortSelect.value;
        renderList();
      };

      window.applyFilter = () => {
        const op = filterOp.value;
        if (op !== "all") {
          const val = parseInt(filterVal.value);
          if (isNaN(val)) {
            showToast("Vui lòng nhập số % để lọc!");
            return;
          }
          currentFilter = { op: op, val: val };
        } else {
          currentFilter = { op: "all", val: 0 };
        }
        renderList();
      };

      window.clearFilter = () => {
        filterOp.value = "all";
        filterVal.value = "";
        filterVal.disabled = true;
        currentFilter = { op: "all", val: 0 };
        renderList();
      };

      function renderList() {
        const processedStudents = getProcessedStudents();

        // Update count text
        listCountSpan.innerText = `(${processedStudents.length} / ${students.length})`;

        if (processedStudents.length === 0) {
          listDiv.innerHTML = `<div class="p-8 text-center text-gray-500 italic">Không tìm thấy học sinh nào phù hợp với bộ lọc.</div>`;
          return;
        }

        listDiv.innerHTML = processedStudents
          .map(
            (s) => `
                <div class="grid grid-cols-12 p-3 text-sm items-center border-b transition-colors ${getBgClass(s.progress)}">
                    <div class="col-span-8 truncate pr-2">${s.name}</div>
                    <div class="col-span-4 text-center text-lg">${s.progress}%</div>
                </div>
            `,
          )
          .join("");
      }

      // Search logic (cho phần cập nhật)
      searchInput.addEventListener("input", (e) => {
        const queryText = e.target.value.toLowerCase().trim();
        if (!queryText) {
          resultsBox.classList.add("hidden");
          return;
        }

        const matches = students.filter((s) =>
          s.name.toLowerCase().includes(queryText),
        );

        if (matches.length) {
          resultsBox.innerHTML = matches
            .map(
              (m) => `
                    <div class="p-3 hover:bg-blue-100 cursor-pointer border-b last:border-0" data-id="${m.id}">
                        ${m.name} <span class="text-xs text-gray-400">(${m.progress}%)</span>
                    </div>
                `,
            )
            .join("");

          resultsBox.querySelectorAll("[data-id]").forEach((el) => {
            el.onclick = () => select(el.getAttribute("data-id"));
          });

          resultsBox.classList.remove("hidden");
        } else {
          resultsBox.innerHTML =
            '<div class="p-3 text-gray-400">Không tìm thấy...</div>';
          resultsBox.classList.remove("hidden");
        }
      });

      function select(id) {
        selectedStudentId = id;
        const s = students.find((item) => item.id === id);
        nameDisplay.innerText = s.name;
        userDisplay.innerText = s.user;
        passDisplay.innerText = s.pass;
        progressInp.value = s.progress;

        updatePanel.classList.remove("hidden");
        resultsBox.classList.add("hidden");
        searchInput.value = "";
      }

      window.resetSelection = () => {
        selectedStudentId = null;
        updatePanel.classList.add("hidden");
      };

      window.copyToClipboard = (type) => {
        const s = students.find((item) => item.id === selectedStudentId);
        const text = type === "username" ? s.user : s.pass;
        const el = document.createElement("textarea");
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        showToast(`Đã copy: ${text}`);
      };

      window.updateProgress = async () => {
        const val = parseInt(progressInp.value);
        if (isNaN(val) || val < 0 || val > 100) {
          showToast("Nhập từ 0 đến 100 nhé!");
          return;
        }

        btnSave.disabled = true;
        btnSave.innerText = "ĐANG LƯU...";

        try {
          const docRef = doc(
            db,
            "artifacts",
            appId,
            "public",
            "data",
            "students",
            selectedStudentId,
          );
          await updateDoc(docRef, { progress: val });
          showToast("Cập nhật thành công!");
          resetSelection();
        } catch (err) {
          showToast("Lỗi khi lưu dữ liệu!");
          console.error(err);
        } finally {
          btnSave.disabled = false;
          btnSave.innerText = "LƯU LẠI";
        }
      };

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.opacity = "1";
        setTimeout(() => (t.style.opacity = "0"), 2000);
      }

      initAuth();
    </script>
  </body>
</html>
